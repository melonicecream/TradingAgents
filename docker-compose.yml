services:
  api:
    build:
      context: .
      dockerfile: web_api/Dockerfile
    env_file:
      - .env.zen
    ports:
      - "8000:8000"
    environment:
      - TRADINGAGENTS_LANGUAGE=한국어
      - TRADINGAGENTS_RESULTS_DIR=/app/results
      - TRADINGAGENTS_DATA_CACHE_DIR=/app/data/cache
    volumes:
      - ./results:/app/results
      - ./eval_results:/app/eval_results
      - ./data:/app/data
    networks:
      - tradingagents-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${API_URL:-http://localhost:8000}
    labels:
      - dev.orbstack.http-port=3000
    depends_on:
      api:
        condition: service_healthy
    networks:
      - tradingagents-network

  telegram:
    build:
      context: .
      dockerfile: telegram_bot/Dockerfile
    env_file:
      - .env.zen
    environment:
      - TRADINGAGENTS_LANGUAGE=한국어
      - TRADINGAGENTS_RESULTS_DIR=/app/results
      - TRADINGAGENTS_DATA_CACHE_DIR=/app/data/cache
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ./results:/app/results
      - ./eval_results:/app/eval_results
      - ./data:/app/data
    networks:
      - tradingagents-network
    restart: unless-stopped

networks:
  tradingagents-network:
    driver: bridge
